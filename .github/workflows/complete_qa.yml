name: Complete QA & Testing Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  flutter-qa:
    name: Flutter Linting, Unit, and Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Install dependencies
        run: flutter pub get

      - name: Flutter Format
        run: dart format --set-exit-if-changed lib test integration_test

      - name: Dart Analyze
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Run Unit Tests
        run: flutter test --coverage

      - name: Enforce Test Coverage (85%)
        run: dart run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --packages=.packages --report-on=lib

  functions-qa:
    name: Node.js Cloud Functions Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Install Firebase Tools for Emulator
        run: npm install -g firebase-tools

      - name: Type Check
        run: npx tsc --noEmit

      - name: Run Jest Tests (with Emulator)
        run: firebase emulators:exec "npm run test"
