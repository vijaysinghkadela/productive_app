name: Deploy
on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Deploy to staging
        run: npx firebase-tools deploy --only functions,firestore,storage --project focusguard-staging --force
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      - name: Post-deploy health check
        run: |
          sleep 10
          curl -f "https://us-central1-focusguard-staging.cloudfunctions.net/api/health" || exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [deploy-staging]
    environment: production
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Deploy to production
        run: npx firebase-tools deploy --only functions,firestore,storage --project focusguard-prod --force
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN_PROD }}
      - name: Post-deploy health check
        run: |
          sleep 15
          curl -f "https://us-central1-focusguard-prod.cloudfunctions.net/api/health" || exit 1
      - name: Notify success
        if: success()
        run: echo "🚀 Production deploy successful for ${{ github.ref_name }}"
      - name: Notify failure
        if: failure()
        run: echo "❌ Production deploy FAILED for ${{ github.ref_name }}"
